syntax = "proto2";

package customenumval;

import "google/protobuf/descriptor.proto";

extend google.protobuf.EnumValueOptions {
  optional string display_name = 50001;
}

enum Priority {
  UNKNOWN = 0;
  HIGH = 1 [(display_name) = "High Priority"];
  LOW = 2 [(display_name) = "Low Priority"];
}

message Task {
  optional string title = 1;
  optional Priority level = 2;
}
