syntax = "proto3";

package wkt_any;

import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";

message Container {
  string id = 1;
  google.protobuf.Any payload = 2;
  google.protobuf.Struct metadata = 3;
  google.protobuf.Value config = 4;
  repeated google.protobuf.Any items = 5;
}

message Wrapper {
  google.protobuf.ListValue tags = 1;
  google.protobuf.NullValue null_field = 2;
}
