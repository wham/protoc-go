syntax = "proto2";
package retain_test;

import "google/protobuf/descriptor.proto";

extend google.protobuf.FieldOptions {
  optional string source_label = 50001 [retention = RETENTION_SOURCE];
  optional int32 runtime_tag = 50002 [retention = RETENTION_RUNTIME];
}

message Config {
  optional string name = 1 [(source_label) = "important", (runtime_tag) = 42];
}
