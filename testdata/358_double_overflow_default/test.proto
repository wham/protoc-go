syntax = "proto2";
package test;

message DoubleOverflow {
  // 1e309 exceeds DBL_MAX (~1.7976931348623158e308) and overflows to +infinity.
  // C++ protoc normalizes this to "inf" via SimpleDtoa.
  // Go protoc-go skips normalization because ParseFloat returns ErrRange,
  // leaving the raw string "1e309" as the default value.
  optional double big = 1 [default = 1e309];
}
