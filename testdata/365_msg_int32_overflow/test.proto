syntax = "proto2";

package msgoverflow;

import "google/protobuf/descriptor.proto";

extend google.protobuf.MessageOptions {
  optional int32 msg_val = 50001;
}

// 0x80000000 = 2147483648 > INT32_MAX (2147483647)
// C++ protoc rejects: "Value out of range"
// Go accepts because checkIntRangeOption is only called for file options
message TestMsg {
  option (msg_val) = 0x80000000;

  optional int32 id = 1;
}
