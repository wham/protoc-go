syntax = "proto2";

package boolcaps;

import "google/protobuf/descriptor.proto";

message BoolConfig {
  optional bool active = 1;
  optional bool verbose = 2;
}

extend google.protobuf.FileOptions {
  optional BoolConfig bool_settings = 50001;
}

option (bool_settings) = { active: TRUE  verbose: FALSE };

message Holder {
  optional string name = 1;
}
