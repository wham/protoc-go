syntax = "proto2";

package oneofdup;

import "google/protobuf/descriptor.proto";

extend google.protobuf.OneofOptions {
  optional int32 oneof_tag = 50001;
}

message MyMessage {
  oneof choice {
    option (oneof_tag) = 42;
    option (oneof_tag) = 99;
    string name = 1;
    int32 id = 2;
  }
}
